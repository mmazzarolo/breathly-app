name: Validate

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-expo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run static checks and unit tests
        run: npm run validate:static

      - name: Validate Expo configuration and dependencies
        run: npm run validate:expo

      - name: Export production bundles for every platform
        run: npm run validate:bundles
